<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>To-Do List</title>
  <style>
    :root {
      --bg: #f4f2ef;
      --surface: #fff;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #0f766e;
      --accent-hover: #0d9488;
      --danger: #b91c1c;
      --border: #e7e5e4;
      --done: #a8a29e;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(28, 25, 23, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 32rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      margin: 0 0 1.25rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1rem 1.1rem;
    }

    .row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
    }

    .row input[type="text"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: transparent;
    }

    button {
      font: inherit;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      padding: 0.55rem 0.9rem;
    }

    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-add {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: var(--accent-hover);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.85rem;
    }

    .filters button {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .filters button.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .filters button:not(.active):hover {
      color: var(--text);
      border-color: #d6d3d1;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
    }

    .list li:last-child {
      border-bottom: none;
    }

    .list input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .list .label {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .list li.done .label {
      color: var(--done);
      text-decoration: line-through;
    }

    .btn-del {
      background: transparent;
      color: var(--danger);
      padding: 0.35rem 0.5rem;
      font-size: 0.875rem;
      flex-shrink: 0;
    }

    .btn-del:hover {
      background: #fef2f2;
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
      padding: 0.75rem 0;
      text-align: center;
    }

    @media (max-width: 380px) {
      .row {
        flex-direction: column;
      }

      .btn-add {
        width: 100%;
      }
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>To-Do List</h1>
    <div class="card">
      <form class="row" id="form" action="#" autocomplete="off">
        <label for="task-input" class="visually-hidden">New task</label>
        <input type="text" id="task-input" placeholder="What needs doing?" maxlength="500">
        <button type="submit" class="btn-add">Add</button>
      </form>

      <div class="filters" role="group" aria-label="Filter tasks">
        <button type="button" data-filter="all" class="active" aria-pressed="true">All</button>
        <button type="button" data-filter="active" aria-pressed="false">Active</button>
        <button type="button" data-filter="done" aria-pressed="false">Done</button>
      </div>

      <ul class="list" id="list" aria-live="polite"></ul>
      <p class="empty" id="empty" hidden>No tasks yet. Add one above.</p>
    </div>
  </div>

  <script>
(function () {
  const STORAGE_KEY = "todo-list-data";
  let tasks = [];
  let currentFilter = "all";

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        tasks = [];
        return;
      }
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) {
        tasks = [];
        return;
      }
      tasks = parsed.filter(function (t) {
        return t && typeof t.id === "string" && typeof t.text === "string" && typeof t.done === "boolean";
      });
    } catch (e) {
      tasks = [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (e) {
      // quota exceeded or private mode
    }
  }

  function uid() {
    return "t-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
  }

  function visibleTasks() {
    if (currentFilter === "active") {
      return tasks.filter(function (t) { return !t.done; });
    }
    if (currentFilter === "done") {
      return tasks.filter(function (t) { return t.done; });
    }
    return tasks.slice();
  }

  const listEl = document.getElementById("list");
  const emptyEl = document.getElementById("empty");
  const formEl = document.getElementById("form");
  const inputEl = document.getElementById("task-input");
  const filterButtons = document.querySelectorAll(".filters button");

  function render() {
    const subset = visibleTasks();
    listEl.innerHTML = "";

    if (tasks.length === 0) {
      emptyEl.hidden = false;
      emptyEl.textContent = "No tasks yet. Add one above.";
      return;
    }

    if (subset.length === 0) {
      emptyEl.hidden = false;
      emptyEl.textContent =
        currentFilter === "active"
          ? "Nothing active. You are all caught up."
          : "No completed tasks in this view.";
      return;
    }

    emptyEl.hidden = true;

    subset.forEach(function (task) {
      const li = document.createElement("li");
      if (task.done) li.className = "done";

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = task.done;
      cb.setAttribute("aria-label", task.done ? "Mark as not done" : "Mark as done");
      cb.addEventListener("change", function () {
        task.done = cb.checked;
        save();
        render();
      });

      const span = document.createElement("span");
      span.className = "label";
      span.textContent = task.text;

      const del = document.createElement("button");
      del.type = "button";
      del.className = "btn-del";
      del.textContent = "Delete";
      del.addEventListener("click", function () {
        tasks = tasks.filter(function (x) { return x.id !== task.id; });
        save();
        render();
      });

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      listEl.appendChild(li);
    });
  }

  formEl.addEventListener("submit", function (e) {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text) return;
    tasks.push({ id: uid(), text: text, done: false });
    inputEl.value = "";
    save();
    render();
    inputEl.focus();
  });

  filterButtons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      currentFilter = btn.getAttribute("data-filter") || "all";
      filterButtons.forEach(function (b) {
        const on = b === btn;
        b.classList.toggle("active", on);
        b.setAttribute("aria-pressed", on ? "true" : "false");
      });
      render();
    });
  });

  load();
  render();
})();
  </script>
</body>
</html>
